name: Stable Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: stable-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-stable:
    name: Publish @focus-mcp/cli@latest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          scope: '@focus-mcp'
      - run: pnpm build
      - name: Upgrade npm for OIDC Trusted Publishing support
        run: npm install -g npm@latest
      - name: Publish with latest tag
        id: publish
        run: |
          OUTPUT=$(npm publish --access public 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "skipped\|E403\|previously published\|already published"; then
            echo "published=false" >> "$GITHUB_OUTPUT"
          else
            echo "published=true" >> "$GITHUB_OUTPUT"
          fi
        # NODE_AUTH_TOKEN fallback: kept for rollback if Trusted Publisher not yet configured on npmjs.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create git tag
        if: steps.publish.outputs.published == 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          echo "Version: $VERSION — Tag: $TAG"

          # Idempotent: skip if tag already exists on remote
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists on remote — skipping."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG" -m "Release $TAG"
            git push origin "$TAG"
            echo "TAG_CREATED=$TAG" >> "$GITHUB_ENV"
          fi

      - name: Create GitHub Release
        if: steps.publish.outputs.published == 'true' && env.TAG_CREATED != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${TAG_CREATED}"
          VERSION="${TAG#v}"

          # Extract changelog section for this version (between ## X.Y.Z headers)
          NOTES=$(awk "/^## ${VERSION}\$/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md || true)

          # Fallback if no changelog section found
          if [ -z "$NOTES" ]; then
            NOTES="Release ${TAG} — see [CHANGELOG.md](CHANGELOG.md) for details."
          fi

          # Mark as prerelease if version contains a dash (e.g. 1.0.0-beta.1)
          PRERELEASE_FLAG=""
          if echo "$VERSION" | grep -q "-"; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$TAG" \
            --title "Release ${TAG}" \
            --notes "$NOTES" \
            $PRERELEASE_FLAG
