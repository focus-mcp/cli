name: Stable Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: stable-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-stable:
    name: Publish @focus-mcp/cli@latest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          scope: '@focus-mcp'
      - run: pnpm build
      - name: Publish with latest tag (or promote if already published)
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          if npm publish --access public 2>&1; then
            echo "Published @focus-mcp/cli@${VERSION} with latest tag"
          else
            echo "Version ${VERSION} already published, promoting to latest tag..."
            npm dist-tag add "@focus-mcp/cli@${VERSION}" latest
            echo "Promoted @focus-mcp/cli@${VERSION} to latest"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
