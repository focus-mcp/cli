name: Dev Publish

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: dev-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-dev:
    name: Publish @focus-mcp/cli@dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          scope: '@focus-mcp'
      - name: Apply changeset snapshot version
        run: |
          # Produces versions like 1.9.0-dev-20260428-abc1234 from pending changesets.
          # Falls back gracefully when no changesets are pending (no-op).
          pnpm changeset version --snapshot dev || true
      - run: pnpm build
      - name: Upgrade npm for OIDC Trusted Publishing support
        run: npm install -g npm@latest
      - name: Publish with dev tag
        run: pnpm changeset publish --no-git-tag --tag dev
        # NODE_AUTH_TOKEN fallback: kept for rollback if Trusted Publisher not yet configured on npmjs.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
