name: Dev Publish

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: dev-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-dev:
    name: Publish @focus-mcp/cli@dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          scope: '@focus-mcp'
      - name: Check for pending changesets
        id: pending
        run: |
          PENDING=$(ls .changeset/*.md 2>/dev/null | grep -v "^.changeset/README" | wc -l || echo 0)
          echo "count=$PENDING" >> $GITHUB_OUTPUT
          if [ "$PENDING" -eq 0 ]; then
            echo "No pending changesets — skipping dev publish."
          fi
      - name: Apply changeset snapshot version
        if: steps.pending.outputs.count != '0'
        run: pnpm changeset version --snapshot dev
      - name: Build
        if: steps.pending.outputs.count != '0'
        run: pnpm build
      - name: Publish with dev tag
        if: steps.pending.outputs.count != '0'
        run: pnpm changeset publish --no-git-tag --tag dev
        # NODE_AUTH_TOKEN fallback: kept for rollback if Trusted Publisher not yet configured on npmjs.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
