#
# Release workflow — on push to main:
#   1. Runs Changesets to bump versions, update CHANGELOG.md and open a "Version Packages" PR.
#   2. When the Version Packages PR is merged, Changesets publishes `@focusmcp/cli` to npm
#      via `pnpm release` (which maps to `changeset publish`).
#
# TODO: before the first release, add `NPM_TOKEN` (an automation token with publish
#       permissions for the `@focusmcp` scope) to the repo secrets.
#       Settings → Secrets and variables → Actions → New repository secret.

name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency: release-${{ github.ref }}

jobs:
  release:
    name: Release via Changesets
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # setup composite already runs actions/setup-node with registry-url,
      # which writes an .npmrc that reads $NODE_AUTH_TOKEN at publish time.
      - uses: ./.github/actions/setup
      - run: pnpm build
      - id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm version
          commit: 'chore(release): version @focusmcp/cli'
          title: 'chore(release): version @focusmcp/cli'
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
