name: Bug report
description: Report a reproducible bug in the FocusMCP CLI
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for filling this out — it helps triage.
  - type: input
    id: command
    attributes:
      label: Affected command
      description: 'Which `focus` subcommand is affected (e.g. `start`, `list`, `info`). If tooling, mention `CI`, `build`, etc.'
      placeholder: 'focus start'
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: CLI version
      description: 'Output of `focus --version` (or the `@focusmcp/cli` version you installed).'
      placeholder: '0.1.0'
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps to reproduce the bug.
      placeholder: |
        1. Run `focus ...`
        2. Observe '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - Windows 11
        - Windows 10
        - macOS 14
        - macOS 13
        - Ubuntu 22.04
        - Ubuntu 24.04
        - Other Linux
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: 'v22.x'
    validations:
      required: true
  - type: input
    id: client
    attributes:
      label: AI client (if relevant)
      description: 'If the CLI is spawned by an AI client (Claude Code, Cursor, etc.), which one?'
      placeholder: 'Claude Code 0.x'
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Relevant logs, stack traces, or screenshots. Redact secrets.
